name: Application CI-CD Pipeline

on:
  push:
    branches: 
      - main
    paths:
      - 'env/prod/frontend-app/**'
      - 'env/prod/backend-api/**'
      - '.github/workflows/application-cicd.yml'

  workflow_dispatch:

concurrency:
  group: employee-app-prod
  cancel-in-progress: false

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-west-1

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # Frontend

    - name: Build Frontend Image
      run: |
        cd env/prod/frontend-app
        docker build -t sam021995/frontend:${{ github.run_number }} .

    - name: Push Frontend Image
      run: |
        docker push sam021995/frontend:${{ github.run_number }}

    # Backend

    - name: Build Backend Image
      run: |
        cd env/prod/backend-api
        docker build -t sam021995/backend:${{ github.run_number }} .

    - name: Push Backend Image
      run: |
        docker push sam021995/backend:${{ github.run_number }}

    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region eu-west-1 --name three-tier-eks

    - name: Deploy Frontend
      run: |
        kubectl set image deployment/frontend frontend=sam021995/frontend:${{ github.run_number }} -n employee-app

    - name: Deploy Backend
      run: |
        kubectl set image deployment/backend backend=sam021995/backend:${{ github.run_number }} -n employee-app

    - name: Verify Frontend Rollout
      run: |
        kubectl rollout status deployment/frontend -n employee-app

    - name: Verify Backend Rollout
      run: |
        kubectl rollout status deployment/backend -n employee-app