apiVersion: v1
kind: Service

metadata:
  name: mysql-service
  namespace: employee-app

spec:
  ports:
  - port: 3306

  selector:
    app: mysql
---
apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql
  namespace: employee-app

spec:
  serviceName: mysql-service

  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql

        image: mysql:5.7

        args:
        - --default-authentication-plugin=mysql_native_password
        - --ssl=0
        - --datadir=/var/lib/mysql-data

        ports:
        - containerPort: 3306

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: rootpass

        - name: MYSQL_DATABASE
          value: employees

        - name: MYSQL_USER
          value: admin

        - name: MYSQL_PASSWORD
          value: admin123

        volumeMounts:
        - name: mysql-storage
          mountPath: /var/lib/mysql

        - name: initdb
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: initdb
        configMap:
          name: mysql-initdb-config

  volumeClaimTemplates:
  - metadata:
      name: mysql-storage

    spec:
      accessModes:
      - ReadWriteOnce

      storageClassName: ebs-sc

      resources:
        requests:
          storage: 1Gi
